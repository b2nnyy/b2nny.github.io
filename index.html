<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>b2nny</title>
  <meta name="description" content="b2nny official links and the new EP b2nny.com." />
  <meta name="theme-color" content="#f2f0ed" />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://b2nny.com/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="b2nny" />
  <meta property="og:url" content="https://b2nny.com/" />
  <meta property="og:title" content="b2nny" />
  <meta property="og:description" content="Official links and the new EP b2nny.com." />
  <meta property="og:image" content="https://b2nny.com/Screenshot%202025-10-23%20180721.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="b2nny" />
  <meta name="twitter:description" content="Official links and the new EP b2nny.com." />
  <script src="./theme.js"></script>
  <style>
    :root {
      --bg: #f2f0ed;
      --fg: #101010;
      --muted: #5f5953;
      --line: #d7d1ca;
      --surface: #e5e1dc;
      --accent: #9f9385;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      min-height: 100vh;
      padding: 2.75rem 1.25rem 3.25rem;
    }

    .wrap {
      width: min(38rem, 100%);
      margin: 0 auto;
    }

    h1 {
      font-size: clamp(2rem, 7vw, 2.9rem);
      letter-spacing: -0.03em;
      line-height: 1.06;
      margin-bottom: 0.45rem;
    }

    .tagline {
      color: var(--muted);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .section {
      margin-bottom: 2rem;
    }

    .section h2 {
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.5rem;
      margin-bottom: 0.8rem;
    }

    .linkList {
      list-style: none;
    }

    .linkList li {
      margin-bottom: 0.35rem;
    }

    .linkList a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid var(--line);
      display: inline-block;
      transition: border-color 0.2s var(--ease);
    }

    .linkList a:hover,
    .linkList a:focus-visible {
      border-bottom-color: var(--fg);
    }
    .buttonRow {
      display: grid;
      gap: 0.55rem;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.6rem;
      width: 100%;
      text-decoration: none;
      color: var(--fg);
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface) 78%, var(--bg));
      padding: 0.52rem 0.66rem;
      font-size: 0.86rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 700;
      transition: border-color 0.2s var(--ease), background 0.2s var(--ease), transform 0.2s var(--ease);
      will-change: transform;
    }
    .btn:hover,
    .btn:focus-visible {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--surface) 55%, var(--bg));
      transform: translateY(-1px);
    }
    .btnPrimary {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--surface) 66%, var(--bg));
    }
    .pluginSpotlight {
      border: 2px solid var(--accent);
      background:
        linear-gradient(
          140deg,
          color-mix(in srgb, var(--surface) 72%, var(--bg) 28%) 0%,
          color-mix(in srgb, var(--surface) 55%, var(--bg) 45%) 100%
        );
      padding: 1rem;
      box-shadow: 0 12px 24px -22px color-mix(in srgb, var(--accent) 65%, transparent);
    }
    .pluginSpotlight .kicker {
      display: inline-block;
      margin-bottom: 0.45rem;
      font-size: 0.66rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 800;
      border: 1px solid var(--accent);
      padding: 0.18rem 0.42rem;
      background: color-mix(in srgb, var(--accent) 16%, var(--bg));
    }
    .pluginSpotlight p {
      color: var(--muted);
      margin-bottom: 0.8rem;
      font-size: 0.93rem;
    }

    .siteFooter {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>@b2nny</h1>
      <p class="tagline">music</p>
    </header>

    <section class="section" aria-label="Links">
      <h2>links</h2>
      <ul class="linkList">
        <li><a href="/live.html">Live</a></li>
        <li><a href="https://open.spotify.com/artist/2tbEf5RXMJ4XXwssBVlJ2B" target="_blank" rel="noopener">Spotify</a></li>
        <li><a href="https://music.apple.com/us/artist/b2nny/1541506202" target="_blank" rel="noopener">Apple Music</a></li>
        <li><a href="https://soundcloud.com/b2nny" target="_blank" rel="noopener">SoundCloud</a></li>
        <li><a href="https://www.youtube.com/channel/UCfdQotfDZTGMygO-wCEGX5g" target="_blank" rel="noopener">YouTube</a></li>
        <li><a href="https://instagram.com/b2nnyy" target="_blank" rel="noopener">Instagram</a></li>
        <li><a href="https://x.com/b2nnny" target="_blank" rel="noopener">X</a></li>
      </ul>
    </section>

    <section class="section" aria-label="EP">
      <h2>b2nny.com ep</h2>
      <div class="buttonRow">
        <a class="btn btnPrimary magnetic" href="https://open.spotify.com/album/0DhLFrHPQ6cCvOoFG92PVm?si=OiCGpN8NQou6cqoUvgsG4g" target="_blank" rel="noopener">Listen on Spotify</a>
        <a class="btn magnetic" href="https://music.apple.com/us/album/b2nny-com-ep/6771491359" target="_blank" rel="noopener">Listen on Apple Music</a>
      </div>
    </section>

    <section class="section" aria-label="2Plugins">
      <h2>2plugins</h2>
      <div class="pluginSpotlight">
        <span class="kicker">Featured</span>
        <p>Download all 2plugins and send plugin feedback from one page.</p>
        <a class="btn btnPrimary magnetic" href="/2plugins.html">Open 2Plugins Page</a>
      </div>
    </section>

    <footer class="siteFooter">
      © <script>document.write(new Date().getFullYear());</script> b2nny
    </footer>
  </main>
  <script>
    (function () {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      document.querySelectorAll(".magnetic").forEach(function (btn) {
        btn.addEventListener("mousemove", function (e) {
          var r = btn.getBoundingClientRect();
          var ox = ((e.clientX - r.left) / r.width - 0.5) * 10;
          var oy = ((e.clientY - r.top) / r.height - 0.5) * 10;
          btn.style.transform = "translate(" + ox + "px, " + oy + "px)";
        });
        btn.addEventListener("mouseleave", function () {
          btn.style.transform = "";
        });
      });
    })();
  </script>
</body>
</html>
