<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>b2nny live</title>
  <meta name="description" content="Watch b2nny live and chat." />
  <meta name="theme-color" content="#f2f0ed" />
  <script src="./theme.js"></script>
  <style>
    :root {
      --bg: #f2f0ed;
      --fg: #101010;
      --muted: #5f5953;
      --line: #d7d1ca;
      --surface: #e5e1dc;
      --accent: #9f9385;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      padding: 1.2rem;
    }

    .wrap {
      width: min(1100px, 100%);
      margin: 0 auto;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.9rem;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .top a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid var(--line);
    }

    .status {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .layout {
      display: grid;
      gap: 0.8rem;
      grid-template-columns: minmax(0, 2fr) minmax(300px, 1fr);
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface) 75%, var(--bg));
    }

    .videoBox {
      width: 100%;
      height: clamp(260px, 62vh, 720px);
      position: relative;
      overflow: hidden;
    }

    #twitch-player {
      width: 100%;
      height: 100%;
    }

    .streamBadge {
      position: absolute;
      top: 0.65rem;
      left: 0.65rem;
      z-index: 4;
      background: rgba(16, 16, 16, 0.84);
      color: #fff;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.24rem 0.4rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .chatHeader {
      border-bottom: 1px solid var(--line);
      padding: 0.65rem 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
    }

    .chatHeader b {
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    button {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--fg);
      padding: 0.4rem 0.55rem;
      cursor: pointer;
      font: inherit;
      font-size: 0.8rem;
    }

    .chatLog {
      height: clamp(240px, 48vh, 580px);
      overflow: auto;
      padding: 0.65rem 0.75rem;
      font-size: 0.9rem;
      line-height: 1.35;
      display: grid;
      gap: 0.35rem;
    }

    .msgName {
      color: var(--accent);
      font-weight: 700;
      margin-right: 0.3rem;
    }

    .chatForm {
      border-top: 1px solid var(--line);
      display: grid;
      gap: 0.5rem;
      padding: 0.65rem 0.75rem;
    }

    .chatForm input {
      width: 100%;
      border: 1px solid var(--line);
      padding: 0.5rem;
      font: inherit;
      background: #fff;
      color: var(--fg);
    }

    .hint {
      color: var(--muted);
      font-size: 0.78rem;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .chatLog {
        height: 340px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <a href="/">← back</a>
      <span id="liveStatus" class="status">Checking live status…</span>
    </div>

    <section class="layout">
      <div class="panel videoBox" id="videoPanel">
        <span id="streamBadge" class="streamBadge">Loading…</span>
        <div id="twitch-player"></div>
      </div>

      <div class="panel">
        <div class="chatHeader">
          <b>Chat</b>
          <button id="loginBtn" type="button">Login with Twitch</button>
        </div>
        <div id="chatLog" class="chatLog"></div>
        <form id="chatForm" class="chatForm">
          <input id="chatInput" type="text" maxlength="500" placeholder="Type chat message…" disabled />
          <button id="sendBtn" type="submit" disabled>Send</button>
          <p id="chatHint" class="hint">Anyone can watch. Login is only needed to type in chat.</p>
        </form>
      </div>
    </section>
  </main>

  <script src="https://player.twitch.tv/js/embed/v1.js"></script>
  <script>
    (function () {
      var CHANNEL = "binglee13";
      var TWITCH_CLIENT_ID = "sk4a49i1xmg1qke4w5u4kgf2w8a8cx"; // Required only for chat login + sending messages.
      var TWITCH_PARENTS = ["b2nny.com", "www.b2nny.com", "localhost", "127.0.0.1"];
      var REDIRECT_URI = window.location.origin + window.location.pathname;
      var CHAT_SCOPE = "chat:read chat:edit";

      var statusEl = document.getElementById("liveStatus");
      var streamBadge = document.getElementById("streamBadge");
      var playerEl = document.getElementById("twitch-player");
      var chatLog = document.getElementById("chatLog");
      var chatForm = document.getElementById("chatForm");
      var chatInput = document.getElementById("chatInput");
      var sendBtn = document.getElementById("sendBtn");
      var loginBtn = document.getElementById("loginBtn");
      var chatHint = document.getElementById("chatHint");

      var ws = null;
      var activeNick = null;
      var accessToken = null;
      var player = null;

      function addChatLine(name, text) {
        var row = document.createElement("div");
        var safe = document.createElement("span");
        safe.textContent = text;
        var title = document.createElement("span");
        title.className = "msgName";
        title.textContent = name + ":";
        row.appendChild(title);
        row.appendChild(safe);
        chatLog.appendChild(row);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      function updateComposer(canSend) {
        chatInput.disabled = !canSend;
        sendBtn.disabled = !canSend;
        chatHint.textContent = canSend
          ? ("Sending as " + activeNick + ".")
          : "Anyone can watch. Login is only needed to type in chat.";
      }

      function parseTokenFromHash() {
        if (!window.location.hash) return null;
        var params = new URLSearchParams(window.location.hash.slice(1));
        var token = params.get("access_token");
        if (token) {
          history.replaceState({}, document.title, window.location.pathname + window.location.search);
        }
        return token;
      }

      function openTwitchLogin() {
        if (!TWITCH_CLIENT_ID) {
          chatHint.textContent = "Chat login disabled until Twitch client id is set in live.html.";
          return;
        }
        var url = new URL("https://id.twitch.tv/oauth2/authorize");
        url.searchParams.set("client_id", TWITCH_CLIENT_ID);
        url.searchParams.set("redirect_uri", REDIRECT_URI);
        url.searchParams.set("response_type", "token");
        url.searchParams.set("scope", CHAT_SCOPE);
        window.location.href = url.toString();
      }

      async function fetchUserFromToken(token) {
        var res = await fetch("https://api.twitch.tv/helix/users", {
          headers: {
            "Authorization": "Bearer " + token,
            "Client-Id": TWITCH_CLIENT_ID
          }
        });
        if (!res.ok) throw new Error("Unable to validate Twitch login.");
        var data = await res.json();
        return data && data.data && data.data[0] ? data.data[0].login : null;
      }

      function connectChat(nick, token) {
        if (ws) ws.close();
        ws = new WebSocket("wss://irc-ws.chat.twitch.tv:443");
        activeNick = nick;

        ws.addEventListener("open", function () {
          ws.send("CAP REQ :twitch.tv/tags twitch.tv/commands");
          if (token) ws.send("PASS oauth:" + token);
          ws.send("NICK " + nick);
          ws.send("JOIN #" + CHANNEL);
          addChatLine(
            "system",
            token
              ? ("Connected as " + nick + ".")
              : "Connected in read-only mode (watch + read chat works without login)."
          );
          updateComposer(Boolean(token));
        });

        ws.addEventListener("message", function (event) {
          var msg = event.data;
          if (msg.startsWith("PING")) {
            ws.send(msg.replace("PING", "PONG"));
            return;
          }
          msg.split("\r\n").forEach(function (line) {
            if (!line || line.indexOf("PRIVMSG") === -1) return;
            var nameMatch = line.match(/display-name=([^;]*)/);
            var body = line.split("PRIVMSG #" + CHANNEL + " :")[1] || "";
            var name = (nameMatch && nameMatch[1]) || "user";
            if (body) addChatLine(name, body);
          });
        });

        ws.addEventListener("close", function () {
          updateComposer(false);
        });
      }

      function initPlayer() {
        player = new Twitch.Player("twitch-player", {
          width: "100%",
          height: "100%",
          channel: CHANNEL,
          parent: TWITCH_PARENTS,
          muted: false
        });

        player.addEventListener(Twitch.Player.ONLINE, function () {
          statusEl.textContent = "Live now";
          streamBadge.textContent = "Live";
        });

        player.addEventListener(Twitch.Player.OFFLINE, function () {
          statusEl.textContent = "Offline";
          streamBadge.textContent = "Offline";
        });

        player.addEventListener(Twitch.Player.READY, function () {
          statusEl.textContent = "Player ready";
          streamBadge.textContent = "Ready";
        });
      }

      loginBtn.addEventListener("click", openTwitchLogin);

      chatForm.addEventListener("submit", function (e) {
        e.preventDefault();
        var text = chatInput.value.trim();
        if (!text || !ws || !accessToken || !activeNick) return;
        ws.send("PRIVMSG #" + CHANNEL + " :" + text);
        chatInput.value = "";
      });

      (async function boot() {
        initPlayer();
        accessToken = parseTokenFromHash();
        if (accessToken && TWITCH_CLIENT_ID) {
          try {
            var login = await fetchUserFromToken(accessToken);
            if (login) {
              connectChat(login, accessToken);
              return;
            }
          } catch (err) {
            addChatLine("system", "Login failed. Falling back to read-only.");
          }
        }
        connectChat("justinfan" + String(Math.floor(Math.random() * 90000) + 10000), null);
      })();
    })();
  </script>
</body>
</html>
